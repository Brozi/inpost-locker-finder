name: Tests
on: [push, pull_request, workflow_call]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements_dev.txt
          pip install -e .
      - name: Run tests
        run: pytest tests/
